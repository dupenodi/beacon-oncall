# Optional synthetic webhook traffic (beacon-sim steady). Set all SIM_* secrets or the job no-ops.
# Intended for staging / demos — do not point at production without safeguards.
name: Webhook simulator (steady)

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: beacon-simulator-steady
  cancel-in-progress: false

jobs:
  steady:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: beacon-sim steady
        env:
          SIM_BASE_URL: ${{ secrets.SIM_BASE_URL }}
          SIM_ORG_SLUG: ${{ secrets.SIM_ORG_SLUG }}
          SIM_SERVICE_ID: ${{ secrets.SIM_SERVICE_ID }}
          SIM_WEBHOOK_SECRET: ${{ secrets.SIM_WEBHOOK_SECRET }}
        run: |
          if [ -z "$SIM_BASE_URL" ] || [ -z "$SIM_ORG_SLUG" ] || [ -z "$SIM_SERVICE_ID" ] || [ -z "$SIM_WEBHOOK_SECRET" ]; then
            echo "Simulator cron skipped: set SIM_BASE_URL, SIM_ORG_SLUG, SIM_SERVICE_ID, and SIM_WEBHOOK_SECRET to enable."
            exit 0
          fi
          npm run start -w @beacon/simulator -- steady \
            --baseUrl "$SIM_BASE_URL" \
            --orgSlug "$SIM_ORG_SLUG" \
            --serviceId "$SIM_SERVICE_ID" \
            --secret "$SIM_WEBHOOK_SECRET"
